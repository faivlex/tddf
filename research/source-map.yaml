import_priority:
  - rank: 1
    source_id: injecagent-repo
    rationale: >-
      Best first importer for task 14 because it directly expands content injection and
      behavioural control coverage with many cases that can normalize into current TDDF
      trap families.

  - rank: 2
    source_id: agentdojo-repo
    rationale: >-
      Best second importer for confused-deputy, finance, inbox, and tool-calling flows.

  - rank: 3
    source_id: modelcontextprotocol-servers-repo
    rationale: >-
      Important backend source for reusable environment profiles, but not a payload
      library in itself.

  - rank: 4
    source_id: garak-repo
    rationale: >-
      Useful for expanding syntactic masking and encoded payload families after the first
      two benchmark importers land.

  - rank: 5
    source_id: jailbreak-llms-repo
    rationale: >-
      Keep deferred until TDDF starts oversight-evasion work and provenance/licensing are
      clear enough for redistribution.
