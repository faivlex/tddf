version: 1
scope: tddf-mvp-source-map
maintainer_note: >-
  Planning and provenance map for shipped TDDF trap classes and the first external
  import queue. This is not the normalized trap registry from task 14; it is the
  research-to-product map that task 14 should build on.

trap_classes:
  - id: web_standard_obfuscation
    status: shipped
    shipped_scenarios:
      - hidden-content-exfiltration
      - metadata-obfuscation-demo
    delivery_variants:
      - html_comment
      - meta_tag
    source_ids:
      - greshake-2023-indirect-prompt-injection
      - verma-yadav-2025-html-metadata
      - evtimov-2025-wasp
      - johnson-2025-accessibility-triggers
    import_candidates:
      - injecagent-repo
    authorship: first_party_adaptation
    notes: >-
      Current TDDF pages are original local scenarios informed by the cited web
      injection literature. No upstream benchmark case ids are imported yet.

  - id: syntactic_masking
    status: shipped
    shipped_scenarios:
      - markdown-masking-demo
      - poisoned-workspace-search
    delivery_variants:
      - markdown_comment
      - white_on_white
    source_ids:
      - keuper-2025-syntactic-masking
    import_candidates:
      - garak-repo
    authorship: first_party_adaptation
    notes: >-
      The document and workspace masking scenarios are TDDF-native compositions that
      mirror the same hidden-text family documented in the cited paper.

  - id: workspace_poisoning
    status: shipped
    shipped_scenarios:
      - poisoned-workspace-search
    delivery_variants:
      - markdown_comment
    source_ids:
      - zou-2025-rag-poisoning
      - clop-teglia-2024-backdoored-retrievers
      - wang-2025-memory-extraction
    import_candidates:
      - injecagent-repo
      - agentdojo-repo
    authorship: first_party_adaptation
    notes: >-
      TDDF currently models poisoned local files and hidden instructions directly,
      without yet ingesting a benchmark dataset for workspace or memory-style traps.

  - id: multi_turn_context_poisoning
    status: shipped
    shipped_scenarios:
      - multi-turn-context-poisoning
    delivery_variants:
      - multi_step_prompt_sequence
      - html_comment
    source_ids:
      - zou-2025-rag-poisoning
      - chen-2024-latent-memory-poisoning
      - wang-2023-contextual-learning
      - zhao-2024-contextual-learning
    import_candidates:
      - injecagent-repo
    authorship: first_party_adaptation
    notes: >-
      The shipped multi-turn scenario is a first-party TDDF composition meant to
      exercise memory and delayed-trigger behavior. It is not imported from an
      upstream multi-turn benchmark yet.

  - id: confused_deputy_exfiltration
    status: shipped
    shipped_scenarios:
      - confused-deputy-finance-demo
    delivery_variants:
      - delegated_request
      - attacker_listener
    source_ids:
      - shapira-2025-confused-deputy
      - reddy-gujral-2025-echoleak
      - alizadeh-2025-agentdojo-banking
      - cohen-2024-self-replicating-prompts
    import_candidates:
      - agentdojo-repo
      - injecagent-repo
    authorship: first_party_adaptation
    notes: >-
      The finance flow is TDDF-authored, but it is explicitly anchored in the
      confused-deputy and zero-click exfiltration literature plus the AgentDojo
      benchmark family.

  - id: mcp_tool_abuse
    status: shipped
    shipped_scenarios:
      - hidden-content-exfiltration
      - metadata-obfuscation-demo
      - markdown-masking-demo
      - poisoned-workspace-search
      - multi-turn-context-poisoning
    delivery_variants:
      - list_resources
      - read_resource
    source_ids:
      - alizadeh-2025-agentdojo-banking
      - shapira-2025-confused-deputy
    import_candidates:
      - modelcontextprotocol-servers-repo
      - agentdojo-repo
    authorship: first_party_harness_with_source_alignment
    notes: >-
      MCP abuse is currently modeled through TDDF's local mock server and sensitive
      resource policy. Official MCP server repos are environment backends, not trap
      datasets, but they are still relevant import targets for task 14.

  - id: oversight_evasion
    status: deferred
    shipped_scenarios: []
    delivery_variants:
      - educational_framing
      - critic_evasion
    source_ids:
      - weinberg-2025-critic-evasion
      - shen-2024-jailbreak-survey
      - oecd-ai-2025-human-overseer-manipulation
    import_candidates:
      - jailbreak-llms-repo
    authorship: not_started
    notes: >-
      This class is still backlog work. It should not be imported until provenance and
      licensing are explicit for the chosen jailbreak datasets.

  - id: multimodal_steganography
    status: deferred
    shipped_scenarios: []
    delivery_variants:
      - image_payload
      - audio_payload
    source_ids:
      - bagdasaryan-2023-steganography
      - qi-2024-vision-jailbreak
    import_candidates: []
    authorship: not_started
    notes: >-
      Deferred until TDDF has a stable multimodal harness and a redistribution-safe
      source set.

  - id: systemic_multi_agent
    status: deferred
    shipped_scenarios: []
    delivery_variants:
      - infectious_jailbreak
      - sybil_consensus
    source_ids:
      - gu-2024-infectious-jailbreak
      - cui-du-2025-sybil-attacks
    import_candidates: []
    authorship: not_started
    notes: >-
      Deferred until TDDF has native multi-agent orchestration instead of single-agent
      local harnesses.

