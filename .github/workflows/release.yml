name: Release

# Builds and publishes TDDF to PyPI via OpenID Connect trusted publishing.
# No PyPI API tokens are stored anywhere — the workflow exchanges a short-lived
# GitHub OIDC token for upload credentials directly with PyPI at publish time.
#
# Trigger: push a tag matching `v*` (e.g. `v2026.4.1`, `v2026.5.0rc1`).
# PyPI's trusted-publisher binding requires that the tag-pushing workflow
# match the configuration on https://pypi.org/manage/account/publishing/ —
# specifically: owner=faivlex, repo=tddf, workflow=release.yml, environment=pypi.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (branch / tag / sha) to build and publish."
        required: true
        default: "main"

permissions:
  contents: read

jobs:
  build:
    name: Build wheel and sdist
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Verify tag matches pyproject.toml version
        if: github.event_name == 'push'
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PYPROJECT_VERSION=$(grep -E '^version = ' pyproject.toml | head -1 | sed -E 's/^version = "([^"]+)".*/\1/')
          if [ "$TAG_VERSION" != "$PYPROJECT_VERSION" ]; then
            echo "::error title=Version mismatch::Tag '${GITHUB_REF_NAME}' (parsed as '${TAG_VERSION}') does not match pyproject.toml version '${PYPROJECT_VERSION}'. Bump pyproject.toml or retag before publishing."
            exit 1
          fi
          echo "✓ Tag ${GITHUB_REF_NAME} matches pyproject.toml version ${PYPROJECT_VERSION}"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Build distributions
        run: uv build

      - name: Show build output
        run: ls -la dist/

      - name: Verify wheel metadata
        run: |
          uv run --with twine -- twine check dist/*

      - name: Upload distributions as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 7

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/tddf
    permissions:
      id-token: write   # required for OIDC token exchange with PyPI
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          # No `password` / `user` fields — trusted publishing handles auth via
          # the OIDC token exchanged at runtime. The action picks this up
          # automatically when `id-token: write` is set above.

  github-release:
    name: Create GitHub Release
    needs: publish-pypi
    # Only create a Release on actual tag pushes — workflow_dispatch runs
    # against an arbitrary ref and shouldn't produce a Release entry.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to create a Release
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download distributions
        uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist/

      - name: Extract release notes from CHANGELOG.md
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          # Print every line between `## [<version>]` and the next `## [` header.
          # CHANGELOG.md follows Keep a Changelog format.
          awk -v tag="$VERSION" '
            BEGIN { found = 0 }
            /^## \[/ {
              if (found) exit
              if ($0 ~ "\\["tag"\\]") { found = 1; next }
            }
            found { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "::warning::No CHANGELOG.md section found for ${VERSION}; falling back to autogenerated notes."
            rm -f release-notes.md
          else
            echo "::notice::Release notes extracted for ${VERSION} ($(wc -l < release-notes.md) lines)."
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ -s release-notes.md ]; then
            gh release create "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" \
              --notes-file release-notes.md \
              dist/*
          else
            gh release create "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" \
              --generate-notes \
              dist/*
          fi
