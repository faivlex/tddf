name: CI

# Runs the full test suite on every push to main and every pull request.
# Pair with branch protection ("Require status checks to pass before merging")
# once you're confident the suite is stable.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        # `uv sync` installs the project plus the `dev` dependency-group
        # (pytest, pytest-xdist, agentdojo) defined in pyproject.toml.
        run: uv sync

      - name: Run tests
        run: uv run pytest -n auto --tb=short

      - name: Build wheel + sdist (smoke)
        # Catches packaging regressions on every push, not just at release time.
        run: uv build
