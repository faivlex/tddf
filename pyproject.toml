[project]
name = "tddf"
version = "0.1.0"
description = "Agent-trap red teaming CLI for deterministic local evaluations"
readme = "tddf.md"
requires-python = ">=3.12"
dependencies = [
  "pydantic>=2.11.0,<3.0.0",
  "pyyaml>=6.0.2,<7.0.0",
  "rich>=14.0.0,<15.0.0",
  "typer>=0.16.0,<0.17.0",
]

[project.scripts]
tddf = "tddf.cli:app"

[dependency-groups]
dev = [
  "pytest>=8.4.0,<9.0.0",
]

[build-system]
requires = ["hatchling>=1.27.0"]
build-backend = "hatchling.build"

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
